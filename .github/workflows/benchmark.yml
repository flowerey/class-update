name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6

      - name: Install dependencies
        run: npm ci

      - name: Build forked version
        run: npm run build

      - name: Download non-forked version and changes
        run: |
          mkdir -p old_version
          mkdir -p test_files
          curl -L https://raw.githubusercontent.com/Metro420yt/class-update/refs/heads/master/dist/index.js -o old_version/index.js
          curl -L https://raw.githubusercontent.com/SyndiShanX/Update-Classes/main/Changes.txt -o test_files/Changes.txt
          cp benchmark/Materialistic.css test_files/theme.css

      - name: Install Hyperfine
        run: sudo apt-get install -y hyperfine

      - name: Run Real World Benchmark
        run: |
          hyperfine --warmup 3 --ignore-failure \
            "INPUT_FOLDER=test_files INPUT_DIFF=test_files/Changes.txt INPUT_EXT=css node dist/index.js" \
            "INPUT_FOLDER=test_files INPUT_DIFF=test_files/Changes.txt INPUT_EXT=css node old_version/index.js"
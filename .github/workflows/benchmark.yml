name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6

      - name: Install dependencies
        run: npm ci

      - name: Build forked version
        run: npm run build

      - name: Download non-forked version
        run: |
          mkdir -p old_version
          curl -L https://raw.githubusercontent.com/Metro420yt/class-update/refs/heads/master/dist/index.js -o old_version/index.js

      - name: Prepare Legacy Data
        run: |
          mkdir -p test_files

          cp benchmark/Materialistic.css test_files/theme.css

          grep -oP '\.[a-zA-Z0-9_-]+' test_files/theme.css | sort | uniq | sed 's/\.//' > classes.txt

          while read -r line; do
            echo "$line" >> stress_diff.txt
            echo "$line-v2" >> stress_diff.txt
          done < classes.txt

      - name: Install Hyperfine
        run: sudo apt-get install -y hyperfine

      - name: Run Benchmark
        run: |
          hyperfine --warmup 2 --runs 5 --ignore-failure \
            --name "New (Optimized Single-Pass)" "INPUT_FOLDER=test_files INPUT_DIFF=stress_diff.txt INPUT_EXT=css node dist/index.js" \
            --name "Old (Legacy Nested-Loops)" "INPUT_FOLDER=test_files INPUT_DIFF=stress_diff.txt INPUT_EXT=css node old_version/index.js"
